<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4B0082">
  <title>&#11088; Euro Rater 2026 &#8212; Live View &#11088;</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Desktop layout overrides */
    html, body { height: auto; overflow: auto; }
    #app {
      max-width: 860px;
      height: auto;
      min-height: 100vh;
      overflow: visible;
      border-left: 3px solid var(--gold);
      border-right: 3px solid var(--gold);
    }
    #country-list { overflow: visible; flex: none; }
    .country-row { cursor: default; }
    .country-rank {
      color: var(--gold);
      font-size: 0.95rem;
      font-weight: bold;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .emoji-zone { gap: 5px; }
    .emoji-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(123, 47, 190, 0.3);
      border: 1px solid rgba(123, 47, 190, 0.6);
      border-radius: 12px;
      padding: 2px 8px 2px 6px;
      font-size: 1.1rem;
      line-height: 1;
    }
    .emoji-pill-count {
      font-size: 0.7rem;
      color: var(--cyan);
      font-family: Arial, sans-serif;
      font-weight: bold;
      line-height: 1;
    }
    /* People section */
    #people-section {
      border-top: 2px solid rgba(123, 47, 190, 0.5);
      margin-top: 12px;
      padding-bottom: 24px;
    }
    .people-section-label {
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px 16px 8px;
      opacity: 0.7;
    }
    #people-list { list-style: none; padding: 0; }
    .people-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(123, 47, 190, 0.2);
    }
    .people-name {
      flex: 1;
      color: var(--gold);
      font-size: 0.95rem;
    }
    .people-timestamp {
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      font-family: Arial, sans-serif;
      font-weight: normal;
    }
    .btn-trash {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      font-family: inherit;
    }
    .btn-trash:hover { background: rgba(255,20,147,0.2); }
    /* Empty / status */
    .empty-message {
      padding: 32px 16px;
      color: rgba(255,255,255,0.35);
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
      font-weight: normal;
      text-align: center;
    }
    .connection-banner {
      background: rgba(255,20,147,0.15);
      border-bottom: 1px solid var(--hot-pink);
      color: var(--hot-pink);
      font-size: 0.8rem;
      font-family: Arial, sans-serif;
      padding: 6px 16px;
      text-align: center;
    }
    .connection-banner.hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>&#11088; Euro Rater 2026 &#8212; Live View &#11088;</h1>
    </header>

    <div id="connection-banner" class="connection-banner hidden">Connecting to server&#8230;</div>

    <ul id="country-list" class="country-list-server"></ul>

    <section id="people-section">
      <p class="people-section-label">Raters</p>
      <ul id="people-list"></ul>
    </section>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
