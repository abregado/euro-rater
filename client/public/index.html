<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4B0082">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>&#11088; Euro Rater 2026 &#11088;</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">

    <div id="install-banner" class="hidden">
      <span>&#128241; Add Euro Rater to your home screen!</span>
      <button id="install-accept">Install</button>
      <button id="install-dismiss">&#x2715;</button>
    </div>

    <div id="fullscreen-overlay" class="modal-overlay hidden">
      <div class="modal">
        <h2>&#127775; Go Fullscreen?</h2>
        <p>For the best Eurovision experience!</p>
        <div class="modal-buttons">
          <button id="fullscreen-yes" class="btn-primary">Yes!</button>
          <button id="fullscreen-no" class="btn-secondary">Not now</button>
        </div>
      </div>
    </div>

    <section id="list-screen">
      <header class="app-header list-header">
        <h1>&#11088; Euro Rater 2026 &#11088;</h1>
        <button id="settings-btn" class="btn-settings" aria-label="Settings">&#9881;</button>
      </header>
      <div class="list-controls">
        <button id="add-country-btn" class="btn-primary">+ Add Country</button>
      </div>
      <ul id="country-list"></ul>
    </section>

    <section id="settings-screen" class="hidden">
      <header class="app-header settings-header">
        <button id="settings-back-btn" class="btn-icon settings-back">&#8592;</button>
        <h1>&#9881; Settings</h1>
        <div class="settings-header-spacer"></div>
      </header>
      <div class="settings-body">
        <div class="settings-field">
          <label for="settings-name">Name</label>
          <input type="text" id="settings-name" placeholder="YourName" autocomplete="off" spellcheck="false">
        </div>
        <div class="settings-field">
          <label for="settings-address">Server address</label>
          <input type="text" id="settings-address" placeholder="192.168.1.1:8080" autocomplete="off" spellcheck="false" inputmode="url">
        </div>
        <div class="settings-field settings-field-row">
          <label for="settings-server-mode">Server mode</label>
          <input type="checkbox" id="settings-server-mode">
          <span id="settings-status" class="status-dot status-off"></span>
        </div>
        <div class="settings-actions">
          <button id="settings-send-btn" class="btn-primary">Send Now</button>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-actions">
          <button id="settings-export-btn" class="btn-secondary-action">&#128229; Export</button>
          <button id="settings-import-btn" class="btn-secondary-action">&#128228; Import</button>
          <input type="file" id="settings-import-file" accept=".json" style="display:none">
        </div>
      </div>
    </section>

  </div>

  <dialog id="add-dialog">
    <div class="dialog-header">
      <h2>&#127758; Choose a Country</h2>
      <button id="close-dialog-btn" class="btn-icon">&#x2715;</button>
    </div>
    <ul id="dialog-country-list"></ul>
  </dialog>

  <dialog id="emoji-picker-dialog"></dialog>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
